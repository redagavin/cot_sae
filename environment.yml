# ABOUTME: Conda environment definition for the CoT-SAE research project.
# ABOUTME: Specifies Python version and core dependencies for SAE-based faithfulness analysis.

name: cot_sae
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
    - torch
    - transformers
    - sae-lens>=4.0
    - transformer-lens
    - datasets
    - numpy
    - pandas
    - matplotlib
    - tqdm
    - jupyter
    - scikit-learn
    - sentence-transformers
